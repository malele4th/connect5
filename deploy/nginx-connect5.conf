# Replace CONNECT5_ROOT_PLACEHOLDER with absolute path to connect5（含 dist/ 的目录）.
# 站点路径：http(s)://主机/web/connect5/
# Install: sudo cp deploy/nginx-connect5.conf /etc/nginx/sites-available/connect5
#          sudo ln -sf /etc/nginx/sites-available/connect5 /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 可选：根路径跳到游戏，便于只记 IP 访问
    location = / {
        return 302 /web/connect5/;
    }

    location /web/connect5/ {
        alias CONNECT5_ROOT_PLACEHOLDER/dist/;
        try_files $uri $uri/ /web/connect5/index.html;
    }

    # 浏览器 WS 为 /web/connect5/socket，后端 Node 仍为 /socket
    location /web/connect5/socket {
        rewrite ^/web/connect5/socket$ /socket break;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
